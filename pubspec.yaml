name: hugrun
description: "Icelandic literacy and numeracy for Hugrún"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Phase 1 dependencies. See .planning/phases/01-skeleton-drift-schema/01-CONTEXT.md
# for decisions D-01..D-25 driving the choices below.
#
# Riverpod family note (D-01 honest pinning):
#   pub.dev as of 2026-05-02 publishes flutter_riverpod 3.3.1 as the latest
#   stable; there is NO flutter_riverpod 4.x stable released. The Riverpod
#   maintainer ships matching codegen at 4.x (riverpod_annotation 4.0.2,
#   riverpod_generator 4.0.3) which internally targets riverpod 3.2.1 — i.e.,
#   the maintainer's intended "Riverpod 4 codegen" cuts against a 3.x runtime.
#   We follow the maintainer's intended pairing.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Localization delegates — required for MaterialApp(supportedLocales: [Locale('is')])
  flutter_localizations:
    sdk: flutter

  # State management (Riverpod). 3.3.1 runtime + 4.x codegen per maintainer
  # (see note above). Phase 1 has the appDatabaseProvider migrated to
  # @riverpod codegen per D-02.
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Persistence (Drift). drift_flutter pulls sqlite3_flutter_libs transitively;
  # we do NOT add sqlite3_flutter_libs as a direct dep (D-06).
  #
  # Version pinning rationale (vs. CONTEXT D-06 "drift_flutter 0.3.x" + the
  # remediation prompt's "drift 2.32.x + drift_flutter 0.3.x" target):
  #   drift_flutter 0.3.0 requires sqlite3 ^3.0.0, which forces drift_dev to
  #   2.32.x with analyzer ^10. analyzer ^10 in turn excludes riverpod_lint
  #   3.1.3 (needs analyzer ^9), riverpod_generator 4.0.3 (analyzer ^9), and
  #   freezed 3.2.5 (analyzer >=9 <11 — partial). The remediation prompt
  #   explicitly prioritizes the Riverpod codegen migration (D-02) over the
  #   drift_flutter 0.3.x bump, so we hold drift at 2.31.x + drift_flutter
  #   0.2.8 (drift ^2.30 floor — same drift runtime API as 2.31). This also
  #   keeps sqlite3 on 2.4.x. The future bump to drift_flutter 0.3 + drift_dev
  #   2.32 is gated on Riverpod publishing analyzer-^10-compatible
  #   {generator, lint} pair (3.1.4-dev.1 already targets analyzer ^12 —
  #   should be quick).
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5

  # Audio (deferred to Phase 4 for actual use; pubspec entry kept so phase 1
  # skeleton tests still see them in pubspec.lock)
  just_audio: ^0.10.5
  audio_session: ^0.2.3

  # Immutable models (no @freezed types in Phase 1 yet; runtime annotation
  # package added so Phase 4's first @freezed type can land without churn)
  freezed_annotation: ^3.1.0

  # Phase 7 D-01: stroke_order_animator (BSD-3-Clause).
  # Glyph-agnostic — the package consumes Make-Me-A-Hanzi-format JSON
  # `{character, strokes: [SVG path], medians: [[[x,y]…]]}` for any writing
  # system. We use it for Ítalíuskrift letter tracing in the Stafir room
  # (TRACE-01..05). The package transitively depends on `http` for online
  # MMAH lookup — we DO NOT use that path; we hand-author offline JSONs and
  # load via `rootBundle.loadString` only. The integration_test
  # `no_network_test.dart` stays green because we never construct an
  # HttpClient at runtime.
  stroke_order_animator: ^3.3.1

  # Phase 10 D-22: Photo personalization deps. All three are platform-clean
  # (no analytics, ads, or trackers in transitive graph) — verified by
  # tools/check-no-tracking.sh in CI. `image` and `uuid` are already pulled
  # in transitively but we declare them as direct deps so the photo upload
  # code path doesn't break if a transitive parent removes them.
  #
  # image_picker: ^1.x — wraps native iOS/Android camera + gallery pickers.
  # No network calls; no telemetry; pure platform-channel API.
  # image: ^4.x — pure-Dart codec for downsizing photos to 1024 px / JPEG q=85
  # before saving to the app documents directory (D-11).
  # uuid: ^4.x — generates the random filename for stored photos.
  image_picker: ^1.1.2
  image: ^4.8.0
  uuid: ^4.5.3
  # `path` joins app-documents-directory with the hugrun_photos/<uuid>.jpg
  # filename in PhotoRepository (Phase 10 D-11). Promoted from dev_dependencies
  # since lib/ now references it directly.
  path: ^1.9.0

  # Marionette MCP runtime (D-09 / FOUND-07). marionette_flutter is the
  # leancodepl AI-agent-driven E2E harness — NOT a scripted test framework.
  # We initialize MarionetteBinding only in debug mode (lib/main.dart) so an
  # external `marionette_mcp` server can attach to the Flutter VM and let an
  # AI agent (Claude Code / Cursor / Copilot via the user's `marionette-verify`
  # skill) drive the app for smoke verification. Production builds embed no
  # MCP surface. See marionette/README.md for the verification model.
  marionette_flutter: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # `path` is used by test/tools/check_no_tracking_test.dart to construct
  # absolute fixture paths. (Also a direct main dep — see above.)


  flutter_lints: ^6.0.0

  # Codegen pipeline. drift_dev 2.31.x analyzer 8.1-10.x overlaps
  # riverpod_generator 4.0.3 analyzer ^9 + freezed 3.2.5 analyzer 9-10.
  build_runner: ^2.10.0
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5

  # Typed asset references (Phase 2 will start using these for audio assets;
  # installed in Phase 1 so the codegen pipeline is exercised).
  flutter_gen_runner: ^5.14.1

  # Lints (D-07 / D-08).
  # riverpod_lint 3.1.x is wired via analysis_options.yaml `plugins:` (uses
  # analysis_server_plugin, NOT custom_lint). We DO NOT install custom_lint
  # because custom_lint 0.8.1 requires analyzer ^8 which conflicts with
  # riverpod_generator/freezed analyzer ^9 — riverpod_lint 3.1.x is the only
  # one of the two we actually need for Phase 1.
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  # Phase 2 D-05 / D-10: 10 explicit asset folders (7 audio + 3 images).
  # Trailing slash matters — flutter_gen_runner emits folder-grouped typed
  # paths from this list. tools/check-asset-paths.sh enforces D-06 path
  # conventions on every file under these roots.
  assets:
    - assets/audio/letters/names/
    - assets/audio/letters/words/
    - assets/audio/letters/phonemes/
    - assets/audio/cvc/
    # Gender-neutral cardinals (fimm/sex/sjö/átta/níu/tíu) and any other
    # genderless number clips ship directly under assets/audio/numbers/.
    # Numbers 1-4 are gendered and live in masculine/feminine/neuter
    # subfolders below.
    - assets/audio/numbers/
    - assets/audio/numbers/masculine/
    - assets/audio/numbers/feminine/
    - assets/audio/numbers/neuter/
    - assets/audio/narration/
    - assets/images/letters/words/
    - assets/images/numbers/
    - assets/images/ui/
    # Phase 7 D-02 / TRACE-01: 32 Make-Me-A-Hanzi-format JSON glyphs
    # (one per Icelandic lowercase letter) for letter tracing.
    - assets/tracing/
