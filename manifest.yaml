  # ===== 18 numerals (Phase 8 D-04, D-05; NUM-01, NUM-02, NUM-03) =====
  # Icelandic 1..4 declines for grammatical gender (M/F/N); 5..10 does NOT
  # decline (single form). Tölur tap-to-hear uses masculine (NUM-03 / D-08
  # — abstract counting school convention); Phase 9 picture counting will
  # resolve via the depicted noun's gender. All 18 keys ship before the
  # native-speaker review pass — see Phase 8 SUMMARY for status.
  #
  # Gendered slugs (1..4):
  #   masculine: einn, tveir, þrír, fjórir → einn, tveir, thrir, fjorir
  #   feminine:  ein, tvær, þrjár, fjórar → ein, tvaer, thrjar, fjorar
  #   neuter:    eitt, tvö, þrjú, fjögur → eitt, tvo, thrju, fjogur
  # Invariant slugs (5..10): fimm, sex, sjö → sjo, átta → atta, níu → niu, tíu → tiu

  # 1..4 masculine
  - key: numberOneMasc
    text: "einn"
    asset: assets/audio/numbers/masculine/einn.aac
    kind: numeral_masculine
    notes_for_reviewer: "Numeral 1 masculine. Used for abstract counting (NUM-03)."
  - key: numberTwoMasc
