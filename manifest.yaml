    asset: assets/audio/letters/words/ros.aac
    kind: example_word
    starts_with: r
  - key: wordS
    text: "sól"
    asset: assets/audio/letters/words/sol.aac
    kind: example_word
    starts_with: s
  - key: wordT
    text: "tönn"
    asset: assets/audio/letters/words/tonn.aac
