    starts_with: d
  - key: wordEth
    text: "maður"
    asset: assets/audio/letters/words/madur.aac
    kind: example_word
    starts_with: ð
    notes_for_reviewer: "ð is rare word-initially in Icelandic; using a word with medial ð (maður) per planning context."
  - key: wordE
    text: "epli"
    asset: assets/audio/letters/words/epli.aac
    kind: example_word
    starts_with: e
  - key: wordEAcute
