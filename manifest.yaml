    starts_with: g
  - key: wordHundur
    text: "hundur"
    asset: assets/audio/letters/words/hundur.aac
    kind: example_word
    starts_with: h
    notes_for_reviewer: "Phase 2 stub key (D-22). Doubles as the example word for letter h — wordHundur IS wordH."
  - key: wordI
    text: "ilmur"
    asset: assets/audio/letters/words/ilmur.aac
    kind: example_word
    starts_with: i
    notes_for_reviewer: "ilmur = scent. Plain-i word avoiding the í-vs-i collision."
  - key: wordIAcute
    text: "íþrótt"
