# manifest.yaml — single source of truth for Phase 3 audio pipeline.
#
# Each entry produces one AAC file under assets/audio/ via tools/tts/bake_audio.py.
# Schema validated by tools/tts/schema.validate_manifest (Plan 02).
#
# Voice: is_IS-steinn-medium (Piper migration 2026-05-02 — replaces Tiro Diljá v2
# after Tiro service was found offline; see tools/tts/README.md).
#
# 118 entries: 32 letter_name + 32 example_word + 32 phoneme + 3 new CVC
# words (hús, hár, gás) + 18 numerals + 1 narration (Phase 8 D-04..D-06
# extension; the previous 100 baseline came from Phase 6 D-01..D-04).
# Phase 2 stub keys preserved (D-22): letterA, letterEth, letterThorn,
# wordHundur, narrationWelcome.
#
# Phase 6 phoneme entries (CVC-02): naming pattern `phoneme<PascalCaseSlug>`
# (e.g. phonemeA, phonemeAAcute, phonemeOumlaut). Asset paths under
# assets/audio/letters/phonemes/{slug}.aac. Text input = the raw letter glyph
# (same as letter names). Native-speaker review pass during Plan 06-01 may
# add per-key entries to pronunciation_overrides.yaml using eSpeak phoneme
# markup (e.g. "[[h]]") when Steinn produces a letter NAME instead of the
# unvoiced phoneme sound. Until reviewed, the Dart manifest write is blocked
# (D-21) and CvcActivity falls back silently per Phase 4's missing-clip path.
version: 1
voice: is_IS-steinn-medium
language: is-IS
utterances:
