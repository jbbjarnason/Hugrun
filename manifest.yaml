# manifest.yaml — single source of truth for Phase 3 audio pipeline.
#
# Each entry produces one AAC file under assets/audio/ via tools/tts/bake_audio.py.
# Schema validated by tools/tts/schema.validate_manifest (Plan 02).
#
# Voice: is_IS-steinn-medium (Piper migration 2026-05-02 — replaces Tiro Diljá v2
# after Tiro service was found offline; see tools/tts/README.md).
#
# 65 entries: 32 letter_name + 32 example_word + 1 narration (D-26).
# Phase 2 stub keys preserved (D-22): letterA, letterEth, letterThorn,
# wordHundur, narrationWelcome.
version: 1
voice: is_IS-steinn-medium
language: is-IS
utterances:
  # ===== 32 letter names (MMS alphabetical order — matches kIcelandicAlphabet) =====
  - key: letterA
    text: "a"
    asset: assets/audio/letters/names/a.aac
    kind: letter_name
  - key: letterAAcute
    text: "á"
    asset: assets/audio/letters/names/a_acute.aac
    kind: letter_name
  - key: letterB
    text: "bé"
    asset: assets/audio/letters/names/b.aac
    kind: letter_name
  - key: letterD
    text: "dé"
    asset: assets/audio/letters/names/d.aac
    kind: letter_name
  - key: letterEth
    text: "eð"
    asset: assets/audio/letters/names/eth.aac
    kind: letter_name
    notes_for_reviewer: "Hot spot: ð voiced dental fricative — must NOT sound like 'd'."
  - key: letterE
    text: "e"
    asset: assets/audio/letters/names/e.aac
    kind: letter_name
  - key: letterEAcute
    text: "é"
    asset: assets/audio/letters/names/e_acute.aac
    kind: letter_name
  - key: letterF
    text: "eff"
    asset: assets/audio/letters/names/f.aac
    kind: letter_name
  - key: letterG
    text: "ge"
    asset: assets/audio/letters/names/g.aac
    kind: letter_name
  - key: letterH
    text: "há"
    asset: assets/audio/letters/names/h.aac
    kind: letter_name
  - key: letterI
    text: "i"
    asset: assets/audio/letters/names/i.aac
    kind: letter_name
  - key: letterIAcute
    text: "í"
    asset: assets/audio/letters/names/i_acute.aac
    kind: letter_name
  - key: letterJ
    text: "joð"
    asset: assets/audio/letters/names/j.aac
    kind: letter_name
  - key: letterK
    text: "ká"
    asset: assets/audio/letters/names/k.aac
    kind: letter_name
  - key: letterL
    text: "ell"
    asset: assets/audio/letters/names/l.aac
    kind: letter_name
  - key: letterM
    text: "emm"
    asset: assets/audio/letters/names/m.aac
    kind: letter_name
  - key: letterN
    text: "enn"
    asset: assets/audio/letters/names/n.aac
    kind: letter_name
  - key: letterO
    text: "o"
    asset: assets/audio/letters/names/o.aac
    kind: letter_name
  - key: letterOAcute
    text: "ó"
    asset: assets/audio/letters/names/o_acute.aac
    kind: letter_name
  - key: letterP
    text: "pé"
    asset: assets/audio/letters/names/p.aac
    kind: letter_name
  - key: letterR
    text: "err"
    asset: assets/audio/letters/names/r.aac
    kind: letter_name
  - key: letterS
    text: "ess"
    asset: assets/audio/letters/names/s.aac
    kind: letter_name
  - key: letterT
    text: "té"
    asset: assets/audio/letters/names/t.aac
    kind: letter_name
  - key: letterU
    text: "u"
    asset: assets/audio/letters/names/u.aac
    kind: letter_name
  - key: letterUAcute
    text: "ú"
    asset: assets/audio/letters/names/u_acute.aac
    kind: letter_name
  - key: letterV
    text: "vaff"
    asset: assets/audio/letters/names/v.aac
    kind: letter_name
  - key: letterX
    text: "ex"
    asset: assets/audio/letters/names/x.aac
    kind: letter_name
    notes_for_reviewer: "x is rare in Icelandic; expect Steinn may render unevenly — flag for re-record if unclear."
  - key: letterY
    text: "y"
    asset: assets/audio/letters/names/y.aac
    kind: letter_name
  - key: letterYAcute
    text: "ý"
    asset: assets/audio/letters/names/y_acute.aac
    kind: letter_name
  - key: letterThorn
    text: "þorn"
    asset: assets/audio/letters/names/thorn.aac
    kind: letter_name
    notes_for_reviewer: "Hot spot: þ voiceless dental fricative — must NOT sound like 't'."
  - key: letterAe
    text: "æ"
    asset: assets/audio/letters/names/ae.aac
    kind: letter_name
    notes_for_reviewer: "Distinct from 'e'; review carefully."
  - key: letterOumlaut
    text: "ö"
    asset: assets/audio/letters/names/o_umlaut.aac
    kind: letter_name
    notes_for_reviewer: "Distinct from 'o'."

  # ===== 32 example words (one per letter; MMS order) =====
  - key: wordA
    text: "api"
    asset: assets/audio/letters/words/api.aac
    kind: example_word
    starts_with: a
  - key: wordAAcute
    text: "ár"
    asset: assets/audio/letters/words/ar.aac
    kind: example_word
    starts_with: á
  - key: wordB
    text: "bók"
    asset: assets/audio/letters/words/bok.aac
    kind: example_word
    starts_with: b
  - key: wordD
    text: "dúkka"
    asset: assets/audio/letters/words/dukka.aac
