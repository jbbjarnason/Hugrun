include: package:flutter_lints/flutter.yaml

# riverpod_lint 3.1.x integrates via `analysis_server_plugin` (NOT custom_lint).
# It surfaces lints inside `dart analyze` / `flutter analyze` automatically.
# The `plugins:` shape below is the documented mechanism per riverpod_lint
# README. We do not install custom_lint (analyzer ^8) — it conflicts with the
# analyzer ^9 we need for riverpod_generator + freezed.
plugins:
  riverpod_lint: ^3.1.3

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.gen.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - ".dart_tool/**"
    # drift_dev-generated migration helpers (test/core/db/generated/) — produced
    # by `dart run drift_dev schema generate`; not hand-edited.
    - "test/core/db/generated/**"
    - "lib/core/db/database.steps.dart"

linter:
  rules:
    # Discretion: pragmatic strict-but-not-pedantic set
    always_declare_return_types: true
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_fields: true
    prefer_final_locals: true
    require_trailing_commas: true

# D-08 (domain-layer purity) is enforced by Plan 05's tools/check-domain-purity.sh
# rather than analyzer rules — the analyzer extension API does not support
# per-file import restrictions natively. The CI script greps for
# `package:flutter` imports in domain files instead.
